<div class="cart-card">
  <div class="cart-card__image-wrapper">
    <img class="cart-card__image" [src]="item().imageUrl || fallbackImage" [alt]="item().name" />
  </div>

  <div class="cart-card__body">
    <div class="cart-card__top">
      <div class="cart-card__info">
        <h3 class="cart-card__name">{{ item().name }}</h3>
        <p class="cart-card__variant">{{ item().variant }}</p>
      </div>
      <span class="cart-card__price">
        {{ formatPrice(item().price.centAmount, item().price.fractionDigits) | currency }}
      </span>
    </div>

    <div class="cart-card__bottom">
      <div class="cart-card__stepper">
        <button
          type="button"
          class="cart-card__step-btn"
          (click)="decrease()"
          [disabled]="item().quantity <= 1"
          aria-label="Decrease quantity">
          −
        </button>
        <span class="cart-card__quantity">{{ item().quantity }}</span>
        <button type="button" class="cart-card__step-btn" (click)="increase()" aria-label="Increase quantity">+</button>
      </div>

      <button type="button" class="cart-card__remove" (click)="onRemove()" aria-label="Remove item">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
      </button>
    </div>
  </div>
</div>
