@if (open()) {
  <div class="modal-overlay">
    <button type="button" class="modal-overlay__backdrop" aria-label="Close dialog" (click)="onOverlayClick()"></button>

    <div class="modal" role="dialog" aria-modal="true" [attr.aria-label]="title() || 'Dialog'">
      <header class="modal__header">
        @if (title()) {
          <h2 class="modal__title">{{ title() }}</h2>
        }
        <button type="button" class="modal__close" aria-label="Close dialog" (click)="close()">×</button>
      </header>

      <div class="modal__body">
        <ng-content></ng-content>
      </div>

      <footer class="modal__footer">
        <ng-content select="[modalFooter]"></ng-content>
      </footer>
    </div>
  </div>
}
