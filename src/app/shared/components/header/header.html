<header class="header">
  <a class="header__logo" routerLink="/">
    <span class="header__logo-icon">&#9786;</span>
    <span class="header__logo-text">RS Ecom</span>
  </a>

  <nav class="header__nav">
    <a class="header__nav-link" routerLink="/shop" routerLinkActive="header__nav-link--active">Shop</a>
    <a class="header__nav-link" routerLink="/tech" routerLinkActive="header__nav-link--active">Tech</a>
    <a class="header__nav-link" routerLink="/new-drops" routerLinkActive="header__nav-link--active">New Drops</a>
    <a class="header__nav-link" routerLink="/support" routerLinkActive="header__nav-link--active">Support</a>
    <a class="header__nav-link" routerLink="/about" routerLinkActive="header__nav-link--active">About Us</a>
  </nav>

  <div class="header__actions">
    <button class="header__icon-btn" aria-label="Cart">
      <mat-icon>shopping_cart</mat-icon>
    </button>
    <button class="header__icon-btn" aria-label="Account">
      <mat-icon>account_circle</mat-icon>
    </button>
  </div>
</header>
