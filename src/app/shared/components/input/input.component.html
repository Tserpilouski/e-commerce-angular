<mat-form-field class="ec-input" appearance="outline">
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }
  @if (prefixIcon()) {
    <mat-icon matPrefix>{{ prefixIcon() }}</mat-icon>
  }

  <input
    matInput
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled"
    [value]="value"
    (input)="onInput($event)" />

  @if (suffixIcon()) {
    <mat-icon matSuffix>{{ suffixIcon() }}</mat-icon>
  }
</mat-form-field>
