<mat-form-field class="ec-input" appearance="outline" subscriptSizing="dynamic">
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }
  @if (prefixIcon()) {
    <mat-icon matPrefix (click)="prefixIconClick.emit()">{{ prefixIcon() }}</mat-icon>
  }

  <input
    matInput
    [type]="type()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled"
    [value]="value"
    (input)="onInput($event)" />

  @if (suffixIcon()) {
    <mat-icon matSuffix (click)="suffixIconClick.emit()">{{ suffixIcon() }}</mat-icon>
  }
</mat-form-field>
