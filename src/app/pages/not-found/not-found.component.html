<div class="not-found-container">
  <img src="/not-found.png" alt="404 Not Found" />
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The tech you are looking for has been moved or doesn't exist.</p>
  <div class="not-found-actions">
    <ec-button label="Go Back" variant="outline" (click)="goBack()"></ec-button>
    <ec-button label="Go Home" variant="primary" [routerLink]="['/']"></ec-button>
  </div>
</div>
