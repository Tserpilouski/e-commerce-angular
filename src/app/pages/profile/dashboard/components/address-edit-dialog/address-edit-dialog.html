<h2 mat-dialog-title>{{ isNew ? 'Add address' : 'Edit address' }}</h2>

<form class="form" [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="form__content">
    <mat-form-field class="form__field form__field--full">
      <mat-label>Label</mat-label>
      <input matInput formControlName="label" />
    </mat-form-field>

    <fieldset class="form__section" formGroupName="recipient">
      <legend class="form__legend">Recipient</legend>

      <mat-form-field class="form__field">
        <mat-label>First name</mat-label>
        <input matInput formControlName="firstName" />
      </mat-form-field>

      <mat-form-field class="form__field">
        <mat-label>Last name</mat-label>
        <input matInput formControlName="lastName" />
      </mat-form-field>

      <mat-form-field class="form__field form__field--full">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone" />
      </mat-form-field>
    </fieldset>

    <fieldset class="form__section" formGroupName="address">
      <legend class="form__legend">Address</legend>

      <mat-form-field class="form__field">
        <mat-label>Country</mat-label>
        <input matInput formControlName="country" />
      </mat-form-field>

      <mat-form-field class="form__field">
        <mat-label>City</mat-label>
        <input matInput formControlName="city" />
      </mat-form-field>

      <mat-form-field class="form__field">
        <mat-label>Postal code</mat-label>
        <input matInput formControlName="postalCode" />
      </mat-form-field>

      <mat-form-field class="form__field">
        <mat-label>Street</mat-label>
        <input matInput formControlName="street" />
      </mat-form-field>

      <mat-form-field class="form__field">
        <mat-label>House number</mat-label>
        <input matInput formControlName="houseNumber" />
      </mat-form-field>

      <mat-form-field class="form__field">
        <mat-label>Apartment number</mat-label>
        <input matInput formControlName="apartmentNumber" />
      </mat-form-field>
    </fieldset>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" mat-dialog-close>Cancel</button>
    <button matButton="filled" type="submit">{{ isNew ? 'Add' : 'Save' }}</button>
  </mat-dialog-actions>
</form>
