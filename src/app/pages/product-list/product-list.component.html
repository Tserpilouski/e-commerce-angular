<div class="product-list__container">
  <div class="product-list__grid">
    <aside class="product-list__sidebar">
      <ec-product-filters [initialFilters]="filters()" (filtersChanged)="onFiltersChanged($event)"></ec-product-filters>
    </aside>

    <div class="product-list__main-content">
      <section class="product-list__section">
        <h2>Numeric Pagination</h2>
        @if (numericLoading()) {
          <ec-loading-spinner label="Loading products…" />
        } @else {
          <ec-pagination-wrapper
            [mode]="PaginationMode.Numeric"
            [response]="numericResponse()"
            [loading]="numericLoading()"
            (pageChange)="onNumericPageChange($event)">
            <ec-product-galeria [products]="paginatedProducts()" (addToCart)="onAddToCart($event)" />
          </ec-pagination-wrapper>
        }
      </section>
    </div>
  </div>
</div>
